<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Abridge — Note Studio</title>
    <style>
      :root {
        --bg: #0f1117; --panel: #171a23; --panel-2: #1e222d; --line: #2a2f3c;
        --text: #e7e9ee; --muted: #99a0b0; --accent: #6d7cff; --accent-2: #4b5bd6;
